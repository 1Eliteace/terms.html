<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Shop - To-Do List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        
        h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #666;
            font-size: 0.9em;
        }
        
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        #todoInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        #todoInput:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-add {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-add:active {
            transform: translateY(0);
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            color: #666;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .filter-btn:hover {
            border-color: #667eea;
        }
        
        #todoList {
            list-style: none;
        }
        
        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            margin-bottom: 10px;
            transition: all 0.3s;
            border-left: 4px solid #667eea;
        }
        
        .todo-item:hover {
            background: #f0f1ff;
            transform: translateX(5px);
        }
        
        .todo-item.completed {
            opacity: 0.6;
        }
        
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }
        
        .todo-checkbox {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .todo-text {
            flex: 1;
            word-break: break-word;
            color: #333;
        }
        
        .todo-date {
            font-size: 0.8em;
            color: #999;
            margin-right: 10px;
        }
        
        .btn-delete {
            padding: 6px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        
        .btn-delete:hover {
            background: #c82333;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        
        .btn-clear-completed {
            flex: 1;
            padding: 10px;
            background: #ffc107;
            color: #333;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .btn-clear-completed:hover {
            background: #ffb300;
        }
        
        .btn-clear-all {
            flex: 1;
            padding: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .btn-clear-all:hover {
            background: #c82333;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .stats {
                flex-direction: row;
                gap: 5px;
            }
            
            .stat-number {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✅ Elite Shop</h1>
            <p class="subtitle">To-Do List mit Local Storage</p>
        </header>
        
        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Neue Aufgabe hinzufügen..." 
                autocomplete="off"
            >
            <button class="btn-add" onclick="addTodo()">+ Hinzufügen</button>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Gesamt</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="activeCount">0</div>
                <div class="stat-label">Aktiv</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Erledigt</div>
            </div>
        </div>
        
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterTodos('all')">Alle</button>
            <button class="filter-btn" onclick="filterTodos('active')">Aktiv</button>
            <button class="filter-btn" onclick="filterTodos('completed')">Erledigt</button>
        </div>
        
        <ul id="todoList"></ul>
        
        <div id="emptyState" class="empty-state">
            <div class="empty-state-icon">📝</div>
            <p>Keine Aufgaben vorhanden. Füge eine neue Aufgabe hinzu!</p>
        </div>
        
        <div class="action-buttons">
            <button class="btn-clear-completed" onclick="clearCompleted()">🗑️ Erledigte löschen</button>
            <button class="btn-clear-all" onclick="clearAll()" title="Alle Aufgaben löschen">⚠️ Alles löschen</button>
        </div>
    </div>
    
    <script>
        // Local Storage Keys
        const STORAGE_KEY = 'eliteShopTodos';
        
        // Status
        let currentFilter = 'all';
        let todos = [];
        
        // Initalisieren beim Laden
        window.addEventListener('DOMContentLoaded', () => {
            loadTodos();
            renderTodos();
            updateStats();
            
            // Enter-Taste zum Hinzufügen
            document.getElementById('todoInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addTodo();
                }
            });
        });
        
        // Todos aus Local Storage laden
        function loadTodos() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                todos = stored ? JSON.parse(stored) : [];
            } catch (error) {
                console.error('Fehler beim Laden:', error);
                todos = [];
            }
        }
        
        // Todos in Local Storage speichern
        function saveTodos() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
            } catch (error) {
                console.error('Fehler beim Speichern:', error);
            }
        }
        
        // Neue Aufgabe hinzufügen
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            
            if (text === '') {
                alert('⚠️ Bitte gib eine Aufgabe ein!');
                input.focus();
                return;
            }
            
            const todo = {
                id: Date.now(),
                text: text,
                completed: false,
                createdAt: new Date().toLocaleDateString('de-DE')
            };
            
            todos.unshift(todo);
            saveTodos();
            input.value = '';
            input.focus();
            
            renderTodos();
            updateStats();
        }
        
        // Todos rendern
        function renderTodos() {
            const list = document.getElementById('todoList');
            const emptyState = document.getElementById('emptyState');
            
            list.innerHTML = '';
            
            const filtered = todos.filter(todo => {
                if (currentFilter === 'active') return !todo.completed;
                if (currentFilter === 'completed') return todo.completed;
                return true;
            });
            
            if (filtered.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            filtered.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <input 
                        type="checkbox" 
                        class="todo-checkbox" 
                        ${todo.completed ? 'checked' : ''} 
                        onchange="toggleTodo(${todo.id})"
                    >
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <span class="todo-date">${todo.createdAt}</span>
                    <button class="btn-delete" onclick="deleteTodo(${todo.id})">Löschen</button>
                `;
                list.appendChild(li);
            });
        }
        
        // Aufgabe als erledigt markieren
        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
                updateStats();
            }
        }
        
        // Aufgabe löschen
        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
            updateStats();
        }
        
        // Erledigte Aufgaben löschen
        function clearCompleted() {
            const completedCount = todos.filter(t => t.completed).length;
            
            if (completedCount === 0) {
                alert('⚠️ Keine erledigten Aufgaben zum Löschen!');
                return;
            }
            
            if (confirm(`${completedCount} erledigte Aufgabe(n) wirklich löschen?`)) {
                todos = todos.filter(t => !t.completed);
                saveTodos();
                renderTodos();
                updateStats();
            }
        }
        
        // Alle Aufgaben löschen
        function clearAll() {
            if (todos.length === 0) {
                alert('⚠️ Keine Aufgaben zum Löschen!');
                return;
            }
            
            if (confirm(`Alle ${todos.length} Aufgabe(n) wirklich löschen? Das kann nicht rückgängig gemacht werden!`)) {
                todos = [];
                saveTodos();
                renderTodos();
                updateStats();
            }
        }
        
        // Filter anwenden
        function filterTodos(filter) {
            currentFilter = filter;
            
            // Filter-Buttons aktualisieren
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTodos();
        }
        
        // Statistiken aktualisieren
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const active = total - completed;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('completedCount').textContent = completed;
        }
        
        // HTML escapen (Sicherheit)
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
